<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    #qr-code {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 260px;
      background: #fafafa;
      border: 1px dashed #ccc;
      border-radius: 12px;
      padding: 16px;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 0.95rem;
      color: #444;
      min-height: 22px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QR Code Generator</h1>

    <label for="qr-input">Enter text or URL</label>
    <input
      id="qr-input"
      type="text"
      placeholder="https://example.com"
    />

    <div class="buttons">
      <button id="generate-btn" type="button">Generate</button>
      <button id="download-btn" type="button">Download PNG</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>

    <div id="qr-code"></div>
    <div id="status" class="status"></div>
  </div>

  <script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
  <script src="scripts/qr-generator.js"></script>
</body>
</html>
